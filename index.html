<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xx的个人博客</title>  <!-- 标题可修改 -->
    <style>
        :root {
            --pink: #e8a0b8;
            --pink-dark: #d4899f;
            --pink-light: #f7d6e0;
            --pink-pale: #fef5f7;
            --white: #ffffff;
            --text: #4a3040;
            --text-light: #7a6070;
            --gold: #c9a87c;
            --gold-light: #e0cdb0;
            --shadow: 0 2px 16px rgba(180, 140, 155, 0.12);
            --shadow-hover: 0 6px 28px rgba(180, 140, 155, 0.22);
            --border: #edd5de;
            --nav-bg: rgba(255, 255, 255, 0.96);
            --radius: 8px;
            --radius-lg: 14px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: '游ゴシック', 'Yu Gothic', 'YuGothic', 'ヒラギノ角ゴ ProN', 'Hiragino Kaku Gothic ProN', 'メイリオ', 'Meiryo', sans-serif; /* 字体可以改成自己想要的 */
            background: var(--pink-pale);
            color: var(--text);
            line-height: 1.7;
            letter-spacing: 0.03em;
            -webkit-font-smoothing: antialiased;
            min-width: 320px;
        }

        .top-ribbon {
            background: linear-gradient(135deg, #e8a0b8 0%, #d4899f 30%, #e8a0b8 60%, #c97d94 100%);
            background-size: 200% 200%;
            animation: ribbonShimmer 8s ease-in-out infinite;
            text-align: center;
            padding: 6px 16px;
            font-size: 0.78rem;
            color: #fff;
            letter-spacing: 0.08em;
            font-weight: 500;
        }

        @keyframes ribbonShimmer {
            0%,
            100% {
                background-position: 0% 50%;
            }
            25% {
                background-position: 100% 0%;
            }
            50% {
                background-position: 100% 100%;
            }
            75% {
                background-position: 0% 100%;
            }
        }

        .top-ribbon a {
            color: #fff;
            text-decoration: underline;
            text-underline-offset: 2px;
            text-decoration-thickness: 1px;
        }

        nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--nav-bg);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--border);
            box-shadow: 0 1px 8px rgba(180, 140, 155, 0.06);
            transition: box-shadow var(--transition);
        }

        nav.scrolled {
            box-shadow: 0 2px 20px rgba(180, 140, 155, 0.14);
        }

        .nav-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            height: 60px;
        }

        .nav-logo {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            color: var(--pink-dark);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color var(--transition);
        }

        .nav-logo:hover {
            color: #c07088;
        }

        .nav-logo .logo-heart {
            display: inline-block;
            font-size: 1.2rem;
            transition: transform var(--transition);
        }

        .nav-logo:hover .logo-heart {
            transform: scale(1.2);
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 8px;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text);
            font-size: 0.88rem;
            font-weight: 500;
            padding: 8px 14px;
            border-radius: 20px;
            transition: all var(--transition);
            letter-spacing: 0.04em;
            white-space: nowrap;
        }

        .nav-links a:hover {
            background: var(--pink-light);
            color: var(--pink-dark);
        }

        .nav-links a.nav-cta {
            background: var(--pink-dark);
            color: #fff;
            padding: 8px 18px;
            border-radius: 20px;
            font-weight: 600;
            letter-spacing: 0.06em;
            transition: all var(--transition);
        }

        .nav-links a.nav-cta:hover {
            background: #c07088;
            transform: translateY(-1px);
            box-shadow: 0 4px 14px rgba(200, 120, 145, 0.35);
        }

        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 8px;
            background: none;
            border: none;
            z-index: 101;
        }

        .hamburger span {
            display: block;
            width: 24px;
            height: 2px;
            background: var(--text);
            border-radius: 2px;
            transition: all var(--transition);
        }

        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }
        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }
        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -5px);
        }

        @media (max-width: 768px) {
            .nav-links {
                position: fixed;
                top: 0;
                right: -100%;
                width: 260px;
                height: 100vh;
                background: #fff;
                flex-direction: column;
                padding: 80px 28px 28px;
                gap: 4px;
                box-shadow: -4px 0 24px rgba(0, 0, 0, 0.08);
                transition: right var(--transition);
                z-index: 100;
                align-items: flex-start;
            }
            .nav-links.open {
                right: 0;
            }
            .nav-links a {
                font-size: 1rem;
                padding: 12px 8px;
                border-radius: 8px;
                width: 100%;
            }
            .nav-links a.nav-cta {
                text-align: center;
                margin-top: 8px;
            }
            .hamburger {
                display: flex;
            }
        }

        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: 99;
        }
        .overlay.show {
            display: block;
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .hero {
            position: relative;
            margin: 28px 0 20px;
            border-radius: var(--radius-lg);
            overflow: hidden;
            background: linear-gradient(160deg, #fbe8ef 0%, #fef5f7 30%, #fce4ec 60%, #f8d8e3 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 320px;
            border: 1px solid var(--border);
        }

        .hero-content {
            text-align: center;
            padding: 48px 28px;
            position: relative;
            z-index: 2;
        }

        .hero-ornament {
            position: absolute;
            width: 120px;
            height: 120px;
            border: 2px solid rgba(200, 140, 160, 0.2);
            border-radius: 50%;
            top: -40px;
            right: -40px;
            pointer-events: none;
        }

        .hero-ornament2 {
            position: absolute;
            width: 80px;
            height: 80px;
            border: 2px solid rgba(200, 140, 160, 0.18);
            border-radius: 50%;
            bottom: -30px;
            left: -30px;
            pointer-events: none;
        }

        .hero-label {
            display: inline-block;
            background: var(--pink-light);
            color: var(--pink-dark);
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            padding: 6px 16px;
            border-radius: 20px;
            margin-bottom: 16px;
        }

        .hero h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            color: #4a3040;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .hero h1 .accent {
            color: var(--pink-dark);
        }

        .hero p {
            color: var(--text-light);
            font-size: 1rem;
            max-width: 500px;
            margin: 0 auto 20px;
            line-height: 1.8;
        }

        .hero-btn {
            display: inline-block;
            background: var(--pink-dark);
            color: #fff;
            text-decoration: none;
            padding: 12px 32px;
            border-radius: 28px;
            font-weight: 600;
            letter-spacing: 0.06em;
            font-size: 0.95rem;
            transition: all var(--transition);
            box-shadow: 0 4px 16px rgba(200, 120, 145, 0.3);
        }

        .hero-btn:hover {
            background: #c07088;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(200, 120, 145, 0.4);
        }

        .section-title {
            text-align: center;
            margin: 40px 0 24px;
            position: relative;
        }

        .section-title h2 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            color: #4a3040;
            display: inline-block;
            position: relative;
            padding: 0 20px;
        }

        .section-title h2::before,
        .section-title h2::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 36px;
            height: 1px;
            background: var(--pink);
            opacity: 0.6;
        }
        .section-title h2::before {
            left: -36px;
        }
        .section-title h2::after {
            right: -36px;
        }

        .section-title .sub {
            display: block;
            font-size: 0.78rem;
            color: var(--text-light);
            letter-spacing: 0.08em;
            margin-top: 4px;
            font-weight: 400;
        }

        .news-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 2px;
            max-width: 800px;
            margin: 0 auto;
        }

        .news-list li {
            border-bottom: 1px solid var(--border);
        }

        .news-list a {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            padding: 14px 12px;
            text-decoration: none;
            color: var(--text);
            border-radius: var(--radius);
            transition: all var(--transition);
            flex-wrap: wrap;
        }

        .news-list a:hover {
            background: #fff;
            box-shadow: var(--shadow-hover);
            transform: translateX(3px);
        }

        .news-date {
            font-size: 0.8rem;
            color: var(--pink-dark);
            font-weight: 600;
            white-space: nowrap;
            letter-spacing: 0.04em;
            min-width: 90px;
            padding-top: 2px;
        }

        .news-category {
            font-size: 0.7rem;
            background: var(--pink-light);
            color: var(--pink-dark);
            padding: 3px 10px;
            border-radius: 12px;
            font-weight: 600;
            letter-spacing: 0.05em;
            white-space: nowrap;
        }

        .news-category.cat-review {
            background: #fde4d0;
            color: #c07a50;
        }
        .news-category.cat-repo {
            background: #e0d8f0;
            color: #6b5b8a;
        }
        .news-category.cat-guide {
            background: #d5ecd4;
            color: #4a7a4a;
        }

        .news-text {
            flex: 1;
            font-size: 0.95rem;
            line-height: 1.5;
            min-width: 200px;
        }

        .news-more {
            text-align: center;
            margin-top: 20px;
        }

        .news-more a {
            display: inline-block;
            color: var(--pink-dark);
            text-decoration: none;
            font-weight: 600;
            letter-spacing: 0.06em;
            font-size: 0.9rem;
            padding: 10px 28px;
            border: 2px solid var(--pink);
            border-radius: 24px;
            transition: all var(--transition);
        }

        .news-more a:hover {
            background: var(--pink-dark);
            color: #fff;
            border-color: var(--pink-dark);
        }

        .grid-cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
            margin-top: 8px;
        }

        .card {
            background: #fff;
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all var(--transition);
            border: 1px solid transparent;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-hover);
            border-color: var(--border);
        }

        .card.hidden {
            display: none;
        }

        .card-img {
            aspect-ratio: 3/4;
            background: linear-gradient(150deg, #fbe8ef 0%, #fef5f7 40%, #f0d8e2 100%);
            position: relative;
            overflow: hidden;
        }

        .card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .card:hover .card-img img {
            transform: scale(1.05);
        }

        .card-img .placeholder-title {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--pink-dark);
            letter-spacing: 0.06em;
            text-align: center;
            padding: 16px;
            line-height: 1.4;
        }

        .card-img .rating-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.9);
            color: var(--gold);
            font-size: 0.8rem;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 12px;
            letter-spacing: 0.04em;
            backdrop-filter: blur(4px);
            z-index: 10;
        }

        .card-body {
            padding: 16px 14px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .card-body .title {
            font-weight: 700;
            font-size: 0.95rem;
            letter-spacing: 0.04em;
            color: #4a3040;
        }

        .card-body .info {
            font-size: 0.78rem;
            color: var(--text-light);
            letter-spacing: 0.03em;
        }

        .card-body .tag {
            display: inline-block;
            font-size: 0.7rem;
            background: var(--pink-pale);
            color: var(--pink-dark);
            padding: 2px 10px;
            border-radius: 10px;
            letter-spacing: 0.04em;
            font-weight: 500;
            align-self: flex-start;
        }

        .card-body .play-date {
            font-size: 0.75rem;
            color: var(--text-light);
            letter-spacing: 0.04em;
        }

        .card-body .thought {
            font-size: 0.8rem;
            color: var(--text);
            line-height: 1.4;
            margin-top: 4px;
            padding-top: 4px;
            border-top: 1px dashed var(--border);
        }

        .load-more-btn {
            text-align: center;
            margin-top: 24px;
        }

        .load-more-btn button {
            background: #fff;
            color: var(--pink-dark);
            border: 2px solid var(--pink);
            padding: 10px 32px;
            border-radius: 24px;
            font-weight: 600;
            letter-spacing: 0.06em;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all var(--transition);
        }

        .load-more-btn button:hover {
            background: var(--pink-dark);
            color: #fff;
            border-color: var(--pink-dark);
            transform: translateY(-2px);
            box-shadow: 0 4px 14px rgba(200, 120, 145, 0.3);
        }

        .search-container {
            max-width: 500px;
            margin: 0 auto 24px;
            position: relative;
        }

        .search-container input {
            width: 100%;
            padding: 10px 44px 10px 18px;
            border: 2px solid var(--border);
            border-radius: 24px;
            font-size: 0.9rem;
            background: #fff;
            color: var(--text);
            transition: all var(--transition);
            outline: none;
            font-family: inherit;
            letter-spacing: 0.04em;
        }

        .search-container input::placeholder {
            color: #c0b0b8;
            letter-spacing: 0.04em;
        }

        .search-container input:focus {
            border-color: var(--pink);
            box-shadow: 0 0 0 4px rgba(232, 160, 184, 0.15);
        }

        .search-container .clear-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            font-size: 1.2rem;
            color: var(--text-light);
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 50%;
            transition: all var(--transition);
            line-height: 1;
            display: none;
        }

        .search-container .clear-btn:hover {
            background: var(--pink-light);
            color: var(--pink-dark);
        }

        .search-container .clear-btn.visible {
            display: block;
        }

        .search-container .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #c0b0b8;
            font-size: 0.9rem;
            pointer-events: none;
        }

        .no-result {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-light);
            font-size: 0.95rem;
            letter-spacing: 0.04em;
            display: none;
            grid-column: 1 / -1;
        }

        .no-result.visible {
            display: block;
        }

        .about-section {
            margin: 36px 0;
            background: linear-gradient(135deg, #fef5f7 0%, #fff 40%, #fdf0f4 100%);
            border-radius: var(--radius-lg);
            padding: 28px 24px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        .about-content {
            display: flex;
            align-items: center;
            gap: 24px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .about-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #e8a0b8 0%, #d4899f 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 2.5rem;
            box-shadow: 0 4px 16px rgba(200, 120, 145, 0.3);
        }

        .about-text {
            flex: 1;
            min-width: 250px;
            text-align: center;
        }

        .about-text h3 {
            font-size: 1.3rem;
            color: var(--pink-dark);
            margin-bottom: 8px;
        }

        .about-text p {
            color: var(--text-light);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .stat-item {
            text-align: center;
        }

        .stat-item .num {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--pink-dark);
        }

        .stat-item .label {
            font-size: 0.8rem;
            color: var(--text-light);
        }

        footer {
            background: #fff;
            border-top: 1px solid var(--border);
            margin-top: 48px;
            padding: 32px 20px 20px;
            text-align: center;
        }

        .footer-inner {
            max-width: 1200px;
            margin: 0 auto;
        }

        .footer-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            list-style: none;
            margin-bottom: 20px;
        }

        .footer-links a {
            text-decoration: none;
            color: var(--text-light);
            font-size: 0.82rem;
            letter-spacing: 0.04em;
            transition: color var(--transition);
        }

        .footer-links a:hover {
            color: var(--pink-dark);
        }

        .footer-social {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 16px;
        }

        .footer-social a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--pink-pale);
            color: var(--pink-dark);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all var(--transition);
        }

        .footer-social a:hover {
            background: var(--pink-dark);
            color: #fff;
        }

        footer .copyright {
            font-size: 0.72rem;
            color: #b0a0a8;
            letter-spacing: 0.05em;
        }

        @media (max-width: 640px) {
            .hero {
                min-height: 240px;
                border-radius: 12px;
                margin: 16px 0 12px;
            }
            .hero h1 {
                font-size: 1.5rem;
            }
            .hero-content {
                padding: 32px 16px;
            }
            .section-title h2 {
                font-size: 1.2rem;
            }
            .section-title h2::before,
            .section-title h2::after {
                width: 20px;
            }
            .section-title h2::before {
                left: -22px;
            }
            .section-title h2::after {
                right: -22px;
            }
            .grid-cards {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 12px;
            }
            .news-list a {
                flex-direction: column;
                gap: 6px;
                padding: 12px 8px;
            }
            .news-date {
                min-width: auto;
            }
            .nav-inner {
                padding: 0 16px;
                height: 52px;
            }
            .nav-logo {
                font-size: 1.3rem;
            }
            .about-content {
                flex-direction: column;
            }
            .stats-bar {
                gap: 20px;
            }
            .search-container {
                max-width: 100%;
                margin: 0 auto 16px;
            }
            .search-container input {
                padding: 8px 40px 8px 14px;
                font-size: 0.85rem;
            }
        }

        @media (max-width: 400px) {
            .grid-cards {
                grid-template-columns: 1fr 1fr;
                gap: 8px;
            }
            .card-body {
                padding: 10px 8px;
            }
            .card-body .title {
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>

    <div class="top-ribbon">
        <span>这是一串文字</span>  <!-- 这里可以改成自己想写的 -->
    </div>

    <nav id="navbar">
        <div class="nav-inner">
            <a href="#" class="nav-logo">
                标题  <!-- 这里可以改成自己想要的标题  类似于xx的博客 -->
            </a>
            <button class="hamburger" id="hamburger" aria-label="菜单">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">首页</a></li>
                <li><a href="about.html" class="nav-cta">关于我</a></li>
            </ul>
        </div>
    </nav>
    <div class="overlay" id="overlay"></div>

    <main>

    <script>
        (function() {
            const hamburger = document.getElementById('hamburger');
            const navLinks = document.getElementById('navLinks');
            const overlay = document.getElementById('overlay');
            const navbar = document.getElementById('navbar');
            const loadMoreBtn = document.getElementById('loadMoreBtn');
            const gameCardsContainer = document.getElementById('gameCards');
            const searchInput = document.getElementById('searchInput');
            const searchClear = document.getElementById('searchClear');
            const noResult = document.getElementById('noResult');

            // 分别是评分、游戏封面、游戏标签、游戏标题、通关时间、想说的话/简介
            // 将游戏封面图片放在网站根目录的images文件夹下  "images/"是文件路径
            // 为防止网页运行卡顿，请尽量使用大小在300KB（或者更小）左右的图片，图片越小加载越快，并不是不能放大图
            // 以下填写仅作演示，可以自行修改~
            // 图片示例仅适合本地观看演示

            const gameData = [{
                rating: 5.0,
                image: "images/封面1.jpg",
                title: "百密一疏少女心",
                tag: "喜剧",
                fullTitle: "百密一疏少女心",
                playDate: "2026.xx.xx",
                thought: "这里是介绍（简介）"
            }, {
                rating: 3.0,
                image: "images/封面2.jpg",
                title: "游戏1",
                tag: "标签",
                fullTitle: "游戏1",
                playDate: "2026.xx.xx",
                thought: "这里是介绍（简介）"
            }, {
                rating: 2.0,
                image: "images/封面8.jpg",
                title: "游戏2",
                tag: "标签",
                fullTitle: "游戏2",
                playDate: "2026.xx.xx",
                thought: "这里是介绍（简介）"
            }, {
                rating: 4.0,
                image: "images/封面3.jpeg",
                title: "游戏3",
                tag: "标签",
                fullTitle: "游戏3",
                playDate: "2026.xx.xx",
                thought: "这里是介绍（简介）"
            }, {
                rating: 2.5,
                image: "images/封面4.png",
                title: "游戏4",
                tag: "标签",
                fullTitle: "游戏4",
                playDate: "2026.xx.xx",
                thought: "这里是介绍（简介）"
            }, {
                rating: 3.5,
                image: "images/封面5.jpg",
                title: "游戏5",
                tag: "标签",
                fullTitle: "游戏5",
                playDate: "2026.xx.xx",
                thought: "这里是介绍（简介）"
            }, {
                rating: 4.5,
                image: "images/封面6.jpg",
                title: "游戏6",
                tag: "标签",
                fullTitle: "游戏6",
                playDate: "2026.xx.xx",
                thought: "这里是介绍（简介）"
            }, {
                rating: 2.5,
                image: "images/封面7.jpg",
                title: "游戏7",
                tag: "标签",
                fullTitle: "游戏7",
                playDate: "2026.xx.xx",
                thought: "这里是介绍（简介）"
            }, {
                rating: 3.5,
                image: "images/封面8.jpg",
                title: "游戏8",
                tag: "标签",
                fullTitle: "游戏8",
                playDate: "2026.xx.xx",
                thought: "这里是介绍（简介）"
            }, {
                rating: 1.5,
                image: "images/封面9.jpg",
                title: "游戏9",
                tag: "标签",
                fullTitle: "游戏9",
                playDate: "2026.xx.xx",
                thought: "这里是介绍（简介）"
            }, {
                rating: 2.0,
                image: "images/封面10.jpg",
                title: "游戏10",
                tag: "标签",
                fullTitle: "游戏10",
                playDate: "2026.xx.xx",
                thought: "这里是介绍（简介）"
            }];

            // 这里只放十个卡片作为举例
            // 可以直接复制粘贴一个大括号的内容，修改数据，新增卡片
            // 倒数第二个大括号后面一定要有逗号，不然会导致数据出错，无法显示
            // 我自己写着写着也很容易丢逗号，所以这里改的话还是自己小心一点更好

            let savedHiddenStates = [];
            let savedLoadMoreVisible = true;

            function renderGameCards(data, isHidden = false) {
                data.forEach(game => {
                    const card = document.createElement('div');
                    card.className = `card${isHidden ? ' hidden' : ''}`;

                    let imageHtml = '';
                    if (game.image) {
                        imageHtml =
                            `<img src="${game.image}" alt="${game.fullTitle}" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">`;
                    }

                    card.innerHTML = `
                        <div class="card-img">
                            <span class="rating-badge">★ ${game.rating}</span>
                            ${imageHtml}
                            <span class="placeholder-title" style="display: ${game.image ? 'none' : 'block'};">${game.title}</span>
                        </div>
                        <div class="card-body">
                            <span class="tag">${game.tag}</span>
                            <span class="title">${game.fullTitle}</span>
                            <span class="play-date">通关时间：${game.playDate}</span>
                            <span class="thought">${game.thought}</span>
                        </div>
                    `;
                    gameCardsContainer.appendChild(card);
                });
            }

            // tip：这里可以设置页面可见卡片数量，剩余隐藏
            renderGameCards(gameData.slice(0, 8));
            renderGameCards(gameData.slice(8), true);

            function saveCurrentState() {
                const cards = gameCardsContainer.children;
                savedHiddenStates = [];
                for (let i = 0; i < cards.length; i++) {
                    savedHiddenStates.push(cards[i].classList.contains('hidden'));
                }
                savedLoadMoreVisible = loadMoreBtn.style.display !== 'none';
            }

            function restoreSavedState() {
                const cards = gameCardsContainer.children;
                for (let i = 0; i < cards.length; i++) {
                    if (i < savedHiddenStates.length) {
                        if (savedHiddenStates[i]) {
                            cards[i].classList.add('hidden');
                        } else {
                            cards[i].classList.remove('hidden');
                        }
                    }
                }
                loadMoreBtn.style.display = savedLoadMoreVisible ? 'block' : 'none';
                noResult.classList.remove('visible');
                searchClear.classList.remove('visible');
            }

            function resetToInitialState() {
                const cards = gameCardsContainer.children;
                for (let i = 0; i < cards.length; i++) {
                    if (i < 8) {
                        cards[i].classList.remove('hidden');
                    } else {
                        cards[i].classList.add('hidden');
                    }
                }
                loadMoreBtn.style.display = 'block';
                noResult.classList.remove('visible');
                searchClear.classList.remove('visible');
            }

            function performSearch(keyword) {
                const trimmed = keyword.trim().toLowerCase();
                if (trimmed === '') {
                    restoreSavedState();
                    return;
                }

                const cards = gameCardsContainer.children;
                let hasMatch = false;

                for (let i = 0; i < cards.length; i++) {
                    const game = gameData[i];
                    if (!game) continue;
                    const match =
                        game.title.toLowerCase().includes(trimmed) ||
                        game.tag.toLowerCase().includes(trimmed) ||
                        game.fullTitle.toLowerCase().includes(trimmed) ||
                        game.thought.toLowerCase().includes(trimmed) ||
                        game.playDate.includes(trimmed);
                    if (match) {
                        cards[i].classList.remove('hidden');
                        hasMatch = true;
                    } else {
                        cards[i].classList.add('hidden');
                    }
                }

                if (hasMatch) {
                    noResult.classList.remove('visible');
                } else {
                    noResult.classList.add('visible');
                }
                loadMoreBtn.style.display = 'none';
                searchClear.classList.add('visible');
            }

            searchInput.addEventListener('input', function() {
                const keyword = this.value;
                if (keyword.trim() === '') {
                    if (savedHiddenStates.length > 0) {
                        restoreSavedState();
                    } else {
                        resetToInitialState();
                    }
                    return;
                }
                if (savedHiddenStates.length === 0) {
                    saveCurrentState();
                }
                performSearch(keyword);
            });

            searchClear.addEventListener('click', function() {
                searchInput.value = '';
                if (savedHiddenStates.length > 0) {
                    restoreSavedState();
                } else {
                    resetToInitialState();
                }
                searchInput.focus();
            });

            loadMoreBtn.addEventListener('click', function() {
                const hiddenCards = document.querySelectorAll('.card.hidden');
                hiddenCards.forEach(card => {
                    card.classList.remove('hidden');
                });
                loadMoreBtn.style.display = 'none';
            });

            function openMenu() {
                navLinks.classList.add('open');
                overlay.classList.add('show');
                hamburger.classList.add('active');
                document.body.style.overflow = 'hidden';
            }

            function closeMenu() {
                navLinks.classList.remove('open');
                overlay.classList.remove('show');
                hamburger.classList.remove('active');
                document.body.style.overflow = '';
            }

            hamburger.addEventListener('click', function() {
                navLinks.classList.contains('open') ? closeMenu() : openMenu();
            });

            overlay.addEventListener('click', closeMenu);

            document.querySelectorAll('.nav-links a').forEach(link => {
                link.addEventListener('click', () => {
                    if (navLinks.classList.contains('open')) closeMenu();
                });
            });

            let scrollTicking = false;
            window.addEventListener('scroll', function() {
                if (!scrollTicking) {
                    requestAnimationFrame(function() {
                        navbar.classList.toggle('scrolled', window.scrollY > 10);
                        scrollTicking = false;
                    });
                    scrollTicking = true;
                }
            });

            document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                anchor.addEventListener('click', function(e) {
                    const targetId = this.getAttribute('href');
                    if (targetId === '#') return;
                    const target = document.querySelector(targetId);
                    if (target) {
                        e.preventDefault();
                        const navHeight = navbar.offsetHeight;
                        const targetPosition = target.getBoundingClientRect().top + window.pageYOffset -
                            navHeight - 12;
                        window.scrollTo({
                            top: targetPosition,
                            behavior: 'smooth'
                        });
                    }
                });
            });

            // 实际项目中替换为后端API请求示例（没有后端可以忽略）
            // fetch('/api/games')
            //   .then(res => res.json())
            //   .then(data => {
            //     renderGameCards(data.slice(0, 8));
            //     renderGameCards(data.slice(8), true);
            //   });

        })();
    </script>

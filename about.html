<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>关于我 | xx的乙女游戏记录</title>
    <style>
        :root {
            --pink: #e8a0b8;
            --pink-dark: #d4899f;
            --pink-light: #f7d6e0;
            --pink-pale: #fef5f7;
            --white: #ffffff;
            --text: #4a3040;
            --text-light: #7a6070;
            --shadow: 0 2px 16px rgba(180, 140, 155, 0.12);
            --shadow-hover: 0 6px 28px rgba(180, 140, 155, 0.22);
            --border: #edd5de;
            --nav-bg: rgba(255, 255, 255, 0.96);
            --radius: 8px;
            --radius-lg: 14px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: '游ゴシック', 'Yu Gothic', 'YuGothic', 'ヒラギノ角ゴ ProN', 'Hiragino Kaku Gothic ProN', 'メイリオ', 'Meiryo', sans-serif;
            background: var(--pink-pale); color: var(--text); line-height: 1.7; letter-spacing: 0.03em;
            -webkit-font-smoothing: antialiased; min-width: 320px;
        }
        .top-ribbon { background: linear-gradient(135deg, #e8a0b8 0%, #d4899f 30%, #e8a0b8 60%, #c97d94 100%); background-size: 200% 200%; animation: ribbonShimmer 8s ease-in-out infinite; text-align: center; padding: 6px 16px; font-size: 0.78rem; color: #fff; letter-spacing: 0.08em; font-weight: 500; }
        @keyframes ribbonShimmer { 0%,100%{background-position:0% 50%} 25%{background-position:100% 0%} 50%{background-position:100% 100%} 75%{background-position:0% 100%} }
        nav { position: sticky; top: 0; z-index: 100; background: var(--nav-bg); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border-bottom: 1px solid var(--border); box-shadow: 0 1px 8px rgba(180,140,155,0.06); transition: box-shadow var(--transition); }
        nav.scrolled { box-shadow: 0 2px 20px rgba(180,140,155,0.14); }
        .nav-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 60px; }
        .nav-logo { font-size: 1.6rem; font-weight: 700; letter-spacing: 0.1em; color: var(--pink-dark); text-decoration: none; display: flex; align-items: center; gap: 6px; transition: color var(--transition); }
        .nav-logo:hover { color: #c07088; }
        .nav-logo .logo-heart { display: inline-block; font-size: 1.2rem; transition: transform var(--transition); }
        .nav-logo:hover .logo-heart { transform: scale(1.2); }
        .nav-links { display: flex; list-style: none; gap: 8px; align-items: center; }
        .nav-links a { text-decoration: none; color: var(--text); font-size: 0.88rem; font-weight: 500; padding: 8px 14px; border-radius: 20px; transition: all var(--transition); letter-spacing: 0.04em; white-space: nowrap; }
        .nav-links a:hover { background: var(--pink-light); color: var(--pink-dark); }
        .nav-links a.active-page { background: var(--pink-dark); color: #fff; font-weight: 600; }
        .nav-links a.nav-cta { background: var(--pink-dark); color: #fff; padding: 8px 18px; border-radius: 20px; font-weight: 600; letter-spacing: 0.06em; transition: all var(--transition); }
        .nav-links a.nav-cta:hover { background: #c07088; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(200,120,145,0.35); }
        .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 8px; background: none; border: none; z-index: 101; }
        .hamburger span { display: block; width: 24px; height: 2px; background: var(--text); border-radius: 2px; transition: all var(--transition); }
        .hamburger.active span:nth-child(1) { transform: rotate(45deg) translate(5px,5px); }
        .hamburger.active span:nth-child(2) { opacity: 0; }
        .hamburger.active span:nth-child(3) { transform: rotate(-45deg) translate(5px,-5px); }
        @media (max-width: 768px) { .nav-links { position: fixed; top: 0; right: -100%; width: 260px; height: 100vh; background: #fff; flex-direction: column; padding: 80px 28px 28px; gap: 4px; box-shadow: -4px 0 24px rgba(0,0,0,0.08); transition: right var(--transition); z-index: 100; align-items: flex-start; } .nav-links.open { right: 0; } .nav-links a { font-size: 1rem; padding: 12px 8px; border-radius: 8px; width: 100%; } .nav-links a.nav-cta { text-align: center; margin-top: 8px; } .hamburger { display: flex; } }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 99; }
        .overlay.show { display: block; }
        main { max-width: 800px; margin: 0 auto; padding: 0 20px; }
        .page-header { text-align: center; margin: 36px 0 28px; }
        .page-header h1 { font-size: 1.8rem; font-weight: 700; letter-spacing: 0.06em; color: #4a3040; display: inline-block; padding: 0 20px; position: relative; }
        .page-header h1::before,.page-header h1::after { content: ''; position: absolute; top: 50%; width: 36px; height: 1px; background: var(--pink); opacity: 0.6; }
        .page-header h1::before { left: -36px; } .page-header h1::after { right: -36px; }
        .about-card { background: #fff; border-radius: var(--radius-lg); box-shadow: var(--shadow); padding: 28px; border: 1px solid var(--border); text-align: center; margin-bottom: 20px; }
        .about-card .avatar { width: 100px; height: 100px; border-radius: 50%; background: linear-gradient(135deg, #e8a0b8 0%, #d4899f 100%); margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 2.5rem; box-shadow: 0 4px 16px rgba(200,120,145,0.3); }
        .about-card h2 { font-size: 1.4rem; color: var(--pink-dark); margin-bottom: 8px; }
        .about-card .intro { color: var(--text-light); font-size: 0.95rem; line-height: 1.6; margin-bottom: 16px; }
        .contact-list { list-style: none; display: flex; flex-wrap: wrap; justify-content: center; gap: 16px; }
        .contact-list a { display: inline-block; background: var(--pink-pale); color: var(--pink-dark); padding: 8px 18px; border-radius: 20px; text-decoration: none; font-weight: 500; font-size: 0.85rem; transition: all var(--transition); }
        .contact-list a:hover { background: var(--pink-dark); color: #fff; }
        .fav-section { background: #fff; border-radius: var(--radius-lg); box-shadow: var(--shadow); padding: 24px; border: 1px solid var(--border); margin-bottom: 20px; }
        .fav-section h3 { font-size: 1.1rem; color: var(--pink-dark); margin-bottom: 12px; text-align: center; }
        .fav-tags { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        .fav-tags span { background: var(--pink-pale); color: var(--pink-dark); padding: 6px 14px; border-radius: 16px; font-size: 0.8rem; font-weight: 500; }
        footer { background: #fff; border-top: 1px solid var(--border); margin-top: 48px; padding: 32px 20px 20px; text-align: center; }
        .footer-inner { max-width: 1200px; margin: 0 auto; }
        .footer-links { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; list-style: none; margin-bottom: 20px; }
        .footer-links a { text-decoration: none; color: var(--text-light); font-size: 0.82rem; transition: color var(--transition); }
        .footer-links a:hover { color: var(--pink-dark); }
        .footer-social { display: flex; justify-content: center; gap: 16px; margin-bottom: 16px; }
        .footer-social a { display: inline-flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 50%; background: var(--pink-pale); color: var(--pink-dark); text-decoration: none; font-size: 0.85rem; font-weight: 600; transition: all var(--transition); }
        .footer-social a:hover { background: var(--pink-dark); color: #fff; }
        footer .copyright { font-size: 0.72rem; color: #b0a0a8; }
        @media (max-width: 640px) { .page-header h1 { font-size: 1.4rem; } .page-header h1::before,.page-header h1::after { width: 20px; } .page-header h1::before { left: -22px; } .page-header h1::after { right: -22px; } .nav-inner { padding: 0 16px; height: 52px; } .nav-logo { font-size: 1.3rem; } }
    </style>
</head>
<body>

    <div class="top-ribbon"><span>这是一串文字</span></div>

    <nav id="navbar">
        <div class="nav-inner">
            <a href="index.html" class="nav-logo">标题</a>
            <button class="hamburger" id="hamburger" aria-label="菜单"><span></span><span></span><span></span></button>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">首页</a></li>
                <li><a href="about.html" class="nav-cta active-page">关于我</a></li>
            </ul>
        </div>
    </nav>
    <div class="overlay" id="overlay"></div>

    <main>
        <div class="page-header"><h1>关于我</h1></div>

        <div class="about-card">
            <div class="avatar">A</div>
            <h2>你的名字</h2>
            <p class="intro">
                简介
            </p>
            <ul class="contact-list">
                <li><a href="#">邮箱：xxx@example.com</a></li>
                <li><a href="#">微博</a></li>
                <li><a href="#">小红书</a></li>
            </ul>
        </div>

        <div class="fav-section">
            <h3>我喜欢的游戏类型（可以换成别的）</h3>
            <div class="fav-tags">
				<p class="intro">
				    简介
				</p>
                <span>类型</span>
            </div>
        </div>

        <div class="fav-section">
            <h3>我的游戏主机</h3>
            <div class="fav-tags">
                <span>Nintendo Switch</span><span>PS Vita</span>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-inner">
            <ul class="footer-links">
                <li><a href="about.html">关于我</a></li>
				<li><a href="https://github.com/brnke/otoge-blogs">GitHub 仓库</a></li>
				<li><a href="about.html">联系我</a></li>
            </ul>
            <p class="copyright">&copy; 2026 乙女游戏个人博客. All rights reserved.</p>
        </div>
    </footer>

    <script>
        (function() {
            const hamburger = document.getElementById('hamburger');
            const navLinks = document.getElementById('navLinks');
            const overlay = document.getElementById('overlay');
            const navbar = document.getElementById('navbar');

            function openMenu() { navLinks.classList.add('open');
                overlay.classList.add('show');
                hamburger.classList.add('active');
                document.body.style.overflow = 'hidden'; }

            function closeMenu() { navLinks.classList.remove('open');
                overlay.classList.remove('show');
                hamburger.classList.remove('active');
                document.body.style.overflow = ''; }
            hamburger.addEventListener('click', () => { navLinks.classList.contains('open') ? closeMenu() : openMenu(); });
            overlay.addEventListener('click', closeMenu);
            document.querySelectorAll('.nav-links a').forEach(l => l.addEventListener('click', () => { if (navLinks.classList.contains('open')) closeMenu(); }));
            let scrollTicking = false;
            window.addEventListener('scroll', function() { if (!scrollTicking) { requestAnimationFrame(function() { navbar.classList.toggle('scrolled', window.scrollY > 10);
                        scrollTicking = false; });
                    scrollTicking = true; } });
        })();
    </script>
</body>
</html>
